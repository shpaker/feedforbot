---
- name: Deploy FeedForBot
  hosts: vds
  vars:
    feedforbot_token: "{{ lookup('env', 'FEEDFORBOT_TOKEN') }}"
    feedforbot_sentry: "{{ lookup('env', 'FEEDFORBOT_SENTRY') | default('', true) }}"
    feedforbot_image: "{{ lookup('env', 'FEEDFORBOT_IMAGE') }}"
    feedforbot_dir: "/home/{{ ansible_user }}/feedforbot"

  tasks:
    - name: Fail if token is not set
      fail:
        msg: "FEEDFORBOT_TOKEN is not set in .env"
      when: feedforbot_token == ""

    - name: Fail if image is not set
      fail:
        msg: "FEEDFORBOT_IMAGE is not set"
      when: feedforbot_image == ""

    - name: Install required packages
      become: true
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure docker is running
      become: true
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      become: true
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Reset connection to pick up docker group
      meta: reset_connection

    - name: Create feedforbot directories
      file:
        path: "{{ feedforbot_dir }}"
        state: directory
        mode: "0755"

    - name: Create redis data directory
      file:
        path: "{{ feedforbot_dir }}/redis_data"
        state: directory
        owner: "999"
        group: "999"
        mode: "0755"
      become: true

    - name: Fix redis_data file ownership
      become: true
      shell: chown -R 999:999 "{{ feedforbot_dir }}/redis_data"
      changed_when: false

    - name: Deploy config.yml
      copy:
        src: "feedforbot.config.yml"
        dest: "{{ feedforbot_dir }}/config.yml"
        mode: "0644"
      register: config_changed

    - name: Inject token into config
      replace:
        path: "{{ feedforbot_dir }}/config.yml"
        regexp: "__FEEDFORBOT_TOKEN__"
        replace: "{{ feedforbot_token }}"
      register: token_injected

    - name: Deploy docker-compose.yml
      template:
        src: "feedforbot.compose.yml.j2"
        dest: "{{ feedforbot_dir }}/docker-compose.yml"
        mode: "0644"
      register: compose_changed

    - name: Start or recreate feedforbot
      shell: docker compose up -d --pull always --force-recreate
      args:
        chdir: "{{ feedforbot_dir }}"
      when: compose_changed.changed or config_changed.changed

    - name: Ensure feedforbot is running
      shell: docker compose up -d
      args:
        chdir: "{{ feedforbot_dir }}"
      when: not (compose_changed.changed or config_changed.changed)

    - name: Wait for container to be healthy
      shell: |
        for i in $(seq 1 30); do
          status=$(docker inspect --format='{% raw %}{{.State.Health.Status}}{% endraw %}' feedforbot 2>/dev/null)
          if [ "$status" = "healthy" ]; then
            echo "Container is healthy"
            exit 0
          fi
          sleep 2
        done
        echo "Container did not become healthy within 60s"
        docker logs feedforbot --tail 20 2>&1
        exit 1
      args:
        chdir: "{{ feedforbot_dir }}"
      register: health_result

    - name: Check container status
      command: docker compose ps
      args:
        chdir: "{{ feedforbot_dir }}"
      register: compose_status
      changed_when: false

    - name: Show status
      debug:
        msg: "FeedForBot is running! {{ health_result.stdout }}"

    - name: Show docker compose ps
      debug:
        var: compose_status.stdout_lines
